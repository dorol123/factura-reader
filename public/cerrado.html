<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factura Reader — Cerrado</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0603;
      color: #f5f0e8;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Fondo con efecto de veta de café */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(92,48,16,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(61,31,8,0.4) 0%, transparent 55%),
        radial-gradient(ellipse 100% 80% at 50% 50%, rgba(44,18,8,0.6) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px;
    }

    .icon {
      font-size: 5rem;
      filter: grayscale(0.3);
      animation: steam 3s ease-in-out infinite;
    }

    @keyframes steam {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .cinta {
      background: #3d1f08;
      border: 1px solid #6b3a18;
      border-radius: 4px;
      padding: 10px 40px;
      transform: rotate(-2deg);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .cinta h1 {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 800;
      letter-spacing: 0.25em;
      color: #f5f0e8;
      text-transform: uppercase;
    }

    .subtitulo {
      font-size: 0.95rem;
      color: #7a5a3a;
      font-weight: 300;
      letter-spacing: 0.05em;
      max-width: 320px;
      line-height: 1.6;
    }

    .linea {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #6b3a18, transparent);
    }

    .marca {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #4a2a10;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">☕</div>
    <div class="cinta">
      <h1>Cerrado</h1>
    </div>
    <div class="linea"></div>
    <p class="subtitulo">Este servicio se mudó.<br>Ya no está disponible en esta dirección.</p>
    <span class="marca">Factura Reader</span>
  </div>
</body>
</html>
